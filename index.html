<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>L'Oréal Skin Care Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo-text">L'ORÉAL</div>
      <div class="logo-subtitle">PARIS</div>
      <h1>Skin Care Assistant</h1>
      <p>Your personal guide to L'Oréal skincare products and routines</p>
      <div class="skin-type-selector">
        <span class="skin-type-label">I have:</span>
        <button type="button" class="skin-type-btn" data-skin="dry">Dry Skin</button>
        <button type="button" class="skin-type-btn" data-skin="oily">Oily Skin</button>
        <button type="button" class="skin-type-btn" data-skin="combination">Combination</button>
        <button type="button" class="skin-type-btn" data-skin="sensitive">Sensitive</button>
      </div>
    </header>

    <!-- PRODUCT SECTION -->
    <section class="products-section">
      <h2 class="products-title">Browse Products</h2>

      <!-- Search field -->
      <div class="product-search-wrap">
        <input type="text" id="productSearch" class="product-search" placeholder="Search products..." autocomplete="off">
        <span class="product-search-icon">&#128269;</span>
      </div>

      <!-- Category filter tabs -->
      <div class="category-tabs">
        <button type="button" class="category-tab active" data-category="all">All</button>
        <button type="button" class="category-tab" data-category="moisturizer">Moisturizers</button>
        <button type="button" class="category-tab" data-category="serum">Serums</button>
        <button type="button" class="category-tab" data-category="cleanser">Cleansers</button>
        <button type="button" class="category-tab" data-category="sunscreen">Sunscreen</button>
        <button type="button" class="category-tab" data-category="eye">Eye Care</button>
      </div>

      <!-- Product grid -->
      <div id="productGrid" class="product-grid"></div>
    </section>

    <!-- SELECTED PRODUCTS BAR -->
    <section id="selectedSection" class="selected-section hidden">
      <div class="selected-header">
        <span class="selected-title">Selected Products</span>
        <button type="button" id="clearAllBtn" class="clear-all-btn">Clear all</button>
      </div>
      <div id="selectedList" class="selected-list"></div>
      <button type="button" id="generateBtn" class="generate-btn">✨ Generate My Routine</button>
    </section>

    <!-- CHAT SECTION -->
    <div id="chatContainer" class="chat-container">
      <div id="chatHistory" class="chat-history"></div>
      <div id="typingIndicator" class="typing-indicator hidden">
        <span></span><span></span><span></span>
      </div>
    </div>

    <form id="chatForm" class="chat-form">
      <input type="text" id="userInput" placeholder="Ask about L'Oréal skincare products..." autocomplete="off">
      <button type="submit" id="sendButton">Send</button>
    </form>
  </div>

  <script src="secrets.js"></script>
  <script src="script.js"></script>
</body>
</html>
